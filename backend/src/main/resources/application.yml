server:
  port: 8888
  servlet:
    context-path: /

spring:
  application:
    name: library-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: admin123
  devtools:
    restart:
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: library-system-secret-key-2026-very-long-for-hs256
  expiration: 86400000

# springdoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.library: debug
